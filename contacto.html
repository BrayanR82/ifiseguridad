<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | IFI Seguridad</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .contact-container {
            max-width: 600px;
            margin: 120px auto 60px;
            padding: 0 20px;
            transition: var(--transition);
        }
        .contact-header { text-align: center; margin-bottom: 50px; }
        .contact-header h1 { font-size: 3rem; font-weight: 600; margin-bottom: 10px; }
        .contact-header p { color: var(--gray-text); font-size: 1.2rem; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 600; }
        
        input, textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
            background: #fbfbfd;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--blue);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        /* Estilos de la animación de éxito (Igual que en pagos) */
        .success-overlay {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s ease forwards;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: #eafaf1;
            color: #2ecc71;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 24px;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Estado del botón enviando */
        .btn-primary.loading { background-color: var(--blue); opacity: 0.7; pointer-events: none; }
        .btn-primary.success-btn { background-color: #2ecc71 !important; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">IFI <span>Seguridad</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="index.html#servicios">Servicios</a></li>
                <li><a href="index.html#productos">Productos</a></li>
                <li><a href="contacto.html" style="color: var(--blue)">Contacto</a></li>
            </ul>
        </div>
    </nav>

    <div id="form-wrapper" class="contact-container fade-in">
        <div class="contact-header">
            <h1>Hablemos.</h1>
            <p>Cuéntanos sobre tus necesidades de seguridad.</p>
        </div>

        <form id="contact-form">
            <div class="form-group">
                <label>Nombre completo</label>
                <input type="text" id="name" placeholder="Ej. Juan Pérez" required>
            </div>
            <div class="form-group">
                <label>Correo electrónico</label>
                <input type="email" id="email" placeholder="nombre@empresa.com" required>
            </div>
            <div class="form-group">
                <label>Mensaje</label>
                <textarea id="message" rows="5" placeholder="¿En qué podemos ayudarte?" required></textarea>
            </div>
            <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; font-size: 1.1rem;">Enviar mensaje</button>
        </form>
    </div>

    <div id="success-screen" class="contact-container success-overlay">
        <div class="icon-circle">✓</div>
        <h1>¡Mensaje enviado!</h1>
        <p style="color: var(--gray-text); margin: 15px 0 30px;">
            Gracias por contactar con IFI Seguridad. <br> 
            Nuestro equipo revisará tu solicitud y te responderá en menos de 24 horas.
        </p>
        <a href="index.html" class="btn btn-primary">Volver al inicio</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        document.getElementById('contact-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const formWrapper = document.getElementById('form-wrapper');
            const successScreen = document.getElementById('success-screen');
            
            // 1. Efecto visual en el botón
            btn.innerText = "Enviando...";
            btn.classList.add('loading');

            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };

            try {
                const response = await fetch('/send-contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    // 2. Cambio de color a verde en el botón
                    btn.classList.remove('loading');
                    btn.classList.add('success-btn');
                    btn.innerText = "¡Enviado!";

                    // 3. Esperar un momento y mostrar pantalla de éxito total
                    setTimeout(() => {
                        formWrapper.style.display = 'none';
                        successScreen.style.display = 'block';
                        
                        // 4. Lanzar Confeti
                        confetti({
                            particleCount: 100,
                            spread: 70,
                            origin: { y: 0.6 },
                            colors: ['#0071e3', '#2ecc71', '#ffffff']
                        });
                    }, 800);
                }
            } catch (err) {
                btn.innerText = "Error al enviar";
                btn.classList.remove('loading');
                alert("No se pudo enviar el mensaje.");
            }
        });
    </script>
</body>
</html>
