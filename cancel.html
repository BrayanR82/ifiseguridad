<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago cancelado | IFI Seguridad</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        .status-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .icon-circle-cancel {
            width: 80px;
            height: 80px;
            background: #fff5f5;
            color: #e74c3c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="icon-circle-cancel">✕</div>
        <h1>El pago no se completó</h1>
        <p style="color: var(--gray-text); margin: 15px 0 30px;">
            No se ha realizado ningún cargo en tu cuenta. <br>
            Si tuviste algún problema técnico, nuestro equipo de soporte está disponible.
        </p>
        <a href="index.html" class="btn btn-buy fade-in" style="width: auto;">Reintentar compra</a>
    </div>
</body>
</html>
